<!DOCTYPE html>

<html lang="zh-CN">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>K7游戏中心 - 应用弹窗规则配置</title>

  <style>

    :root {

      --sidebar-width: 220px;

      --sidebar-bg: #001529;

      --accent-gold: #faad14;

      --header-bg: linear-gradient(135deg, #001529 0%, #003a70 100%);

      --border-light: #f0f0f0;

      --text-secondary: #8c8c8c;

    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {

      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;

      background: #f5f5f5;

      overflow: hidden;

    }

    #root { height: 100vh; display: flex; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }

    ::-webkit-scrollbar-track { background: transparent; }

    ::-webkit-scrollbar-thumb { background: #d9d9d9; border-radius: 3px; }

    ::-webkit-scrollbar-thumb:hover { background: #bfbfbf; }



    .k7-sidebar {

      width: var(--sidebar-width);

      min-width: var(--sidebar-width);

      background: var(--sidebar-bg);

      display: flex;

      flex-direction: column;

      height: 100vh;

      user-select: none;

    }

    .k7-logo {

      height: 56px;

      display: flex;

      align-items: center;

      padding: 0 20px;

      background: var(--header-bg);

      border-bottom: 1px solid rgba(255,255,255,0.08);

      gap: 10px;

    }

    .k7-logo-icon {

      width: 32px; height: 32px;

      background: linear-gradient(135deg, #faad14, #f5222d);

      border-radius: 8px;

      display: flex; align-items: center; justify-content: center;

      font-weight: 700; font-size: 14px; color: #fff;

      flex-shrink: 0;

    }

    .k7-logo-text {

      color: #fff;

      font-size: 16px;

      font-weight: 600;

      letter-spacing: 1px;

    }

    .k7-logo-text .gold { color: var(--accent-gold); }

    .k7-menu-area { flex: 1; overflow-y: auto; padding: 12px 0; }

    .k7-menu-section { padding: 0 12px; margin-bottom: 4px; }

    .k7-menu-section-title {

      display: flex; align-items: center; gap: 8px;

      padding: 8px 12px;

      color: rgba(255,255,255,0.45);

      font-size: 12px;

      letter-spacing: 0.5px;

    }

    .k7-menu-item {

      display: flex; align-items: center; gap: 10px;

      padding: 10px 12px 10px 28px;

      color: rgba(255,255,255,0.65);

      font-size: 14px;

      border-radius: 6px;

      cursor: pointer;

      transition: all 0.2s;

      margin: 2px 0;

    }

    .k7-menu-item:hover { color: #fff; background: rgba(255,255,255,0.08); }

    .k7-menu-item.active {

      color: #fff;

      background: linear-gradient(135deg, #1890ff, #096dd9);

      box-shadow: 0 2px 8px rgba(24,144,255,0.3);

    }

    .k7-menu-item .icon { font-size: 16px; width: 18px; text-align: center; }



    .k7-main {

      flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #f5f5f5;

    }

    .k7-header {

      height: 56px; background: #fff;

      border-bottom: 1px solid var(--border-light);

      display: flex; align-items: center; padding: 0 24px; gap: 16px;

      box-shadow: 0 1px 4px rgba(0,0,0,0.04); flex-shrink: 0;

    }

    .k7-header-breadcrumb { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); font-size: 13px; }

    .k7-header-breadcrumb .sep { color: #d9d9d9; }

    .k7-header-breadcrumb .current { color: #262626; font-weight: 500; }

    .k7-header-right { margin-left: auto; display: flex; align-items: center; gap: 16px; color: var(--text-secondary); font-size: 13px; }

    .k7-content { flex: 1; padding: 16px 20px; overflow-y: auto; }



    .scene-layout { display: flex; gap: 8px; height: calc(100% - 44px); }

    .scene-nav-panel {

      width: 320px; min-width: 200px; background: #fff;

      border-radius: 8px; border: 1px solid var(--border-light);

      display: flex; flex-direction: column; overflow: hidden; position: relative;

    }

    .scene-nav-header {

      padding: 8px 14px; border-bottom: 1px solid var(--border-light);

      font-weight: 600; font-size: 14px; color: #262626;

      background: #fafafa; display: flex; align-items: center; justify-content: space-between;

    }

    .scene-nav-body { flex: 1; overflow-y: auto; padding: 6px; }

    .scene-node { margin-bottom: 2px; }

    .scene-node-header {

      display: flex; align-items: center; padding: 5px 8px; border-radius: 6px;

      cursor: pointer; transition: all 0.2s; gap: 6px;

    }

    .scene-node-header:hover { background: #f5f5f5; }

    .scene-node-header.active { background: #e6f7ff; border: 1px solid #91d5ff; }

    .scene-node-header .expand-icon {

      font-size: 10px; color: var(--text-secondary);

      transition: transform 0.2s; width: 14px; text-align: center; flex-shrink: 0;

    }

    .scene-node-header .expand-icon.expanded { transform: rotate(90deg); }

    .scene-node-header .scene-name {

      flex: 1; font-size: 14px; font-weight: 500; color: #262626;

      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;

    }

    .scene-node-header .scene-meta { font-size: 11px; color: var(--text-secondary); white-space: nowrap; }

    .scene-node-header .scene-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.2s; }

    .scene-node-header:hover .scene-actions { opacity: 1; }

    .scene-children { padding-left: 20px; }

    .flow-node { margin-bottom: 1px; }

    .flow-node-header {

      display: flex; align-items: center; padding: 4px 8px; border-radius: 6px;

      cursor: pointer; transition: all 0.2s; gap: 6px;

    }

    .flow-node-header:hover { background: #f5f5f5; }

    .flow-node-header.active { background: #e6f7ff; border: 1px solid #91d5ff; }

    .flow-node-header .flow-name {

      flex: 1; font-size: 13px; color: #434343;

      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;

    }

    .flow-node-header .flow-meta { font-size: 11px; color: var(--text-secondary); white-space: nowrap; }

    .flow-node-header .flow-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.2s; }

    .flow-node-header:hover .flow-actions { opacity: 1; }

    .activity-list { padding-left: 20px; }

    .activity-item {

      display: flex; align-items: center; padding: 3px 8px; border-radius: 6px;

      cursor: pointer; transition: all 0.2s; gap: 6px; margin-bottom: 1px;

      border: 1px solid transparent;

    }

    .activity-item:hover { background: #fafafa; border-color: var(--border-light); }

    .activity-item.active { background: #e6f7ff; border-color: #91d5ff; }

    .activity-item.dragging { opacity: 0.5; background: #f0f5ff; }

    .activity-item.drag-over { border-top: 2px solid #1890ff; }

    .activity-item .drag-handle { cursor: grab; color: #d9d9d9; font-size: 12px; flex-shrink: 0; }

    .activity-item .drag-handle:active { cursor: grabbing; }

    .activity-item .activity-name {

      flex: 1; font-size: 13px; color: #595959;

      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;

    }

    .activity-item .activity-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.2s; }

    .activity-item:hover .activity-actions { opacity: 1; }

    .create-btn-row { padding: 5px 10px 2px 28px; }

    .scene-detail-panel {

      flex: 1; background: #fff; border-radius: 8px; border: 1px solid var(--border-light);

      display: flex; flex-direction: column; overflow: hidden;

    }

    .scene-detail-panel .ant-tabs { height: 100%; display: flex; flex-direction: column; }

    .scene-detail-panel .ant-tabs-content-holder { flex: 1; overflow: hidden; }

    .scene-detail-panel .ant-tabs-content { height: 100%; }

    .scene-detail-panel .ant-tabs-tabpane { height: 100%; }

    .scene-detail-placeholder {

      flex: 1; display: flex; flex-direction: column; align-items: center;

      justify-content: center; color: #bfbfbf; gap: 8px;

    }

    .scene-detail-placeholder .big-icon { font-size: 48px; opacity: 0.3; }

    .scene-detail-placeholder .hint { font-size: 13px; }

    .tab-content-wrapper { height: 100%; display: flex; flex-direction: column; }

    .create-form-row { margin-bottom: 10px; }

    .create-form-row label { display: block; margin-bottom: 6px; font-size: 13px; color: #595959; font-weight: 500; }

    .placeholder-tab {

      display: flex; flex-direction: column; align-items: center;

      justify-content: center; height: 300px; color: #bfbfbf; gap: 16px;

    }

    .placeholder-tab .icon-big { font-size: 56px; opacity: 0.3; }

    .placeholder-tab .text { font-size: 16px; letter-spacing: 1px; }

    .filter-bar {

      background: #fff; padding: 10px 16px; border-radius: 8px;

      border: 1px solid var(--border-light); margin-bottom: 10px;

      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;

    }

    .filter-bar .filter-label { font-size: 13px; color: #595959; font-weight: 500; white-space: nowrap; }

    .k7-tabs-container { height: 100%; display: flex; flex-direction: column; }

    .ant-tabs-content { height: 100%; }

    .ant-tabs-tabpane { height: 100%; }

    /* 活动配置 */

    .activity-wrapper { height: 100%; display: flex; flex-direction: column; }

    .activity-table-wrap { flex: 1; background: #fff; border-radius: 8px; border: 1px solid var(--border-light); overflow: hidden; padding: 10px; }

    .activity-filter { background: #fff; padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border-light); margin-bottom: 10px; }

    .activity-filter-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .activity-filter-row .filter-item { display: flex; align-items: center; gap: 6px; }

    .activity-filter-row .filter-item label { font-size: 13px; color: #595959; white-space: nowrap; flex-shrink: 0; }

    .activity-filter-actions { display: flex; gap: 6px; margin-left: auto; }

    .config-textarea { font-family: 'SFMono-Regular', Consolas, monospace; font-size: 12px; }

    .act-table-id { color: #8c8c8c; font-size: 12px; }

    .app-tag { margin: 1px; }

    /* 字段注释 */

    .field-comment-hint { border-bottom: 1px solid #d9d9d9; cursor: help; }

    .field-comment-hint:hover { border-bottom-color: #1890ff; }

    .col-comment-icon {

      display: inline-flex; align-items: center; justify-content: center;

      width: 14px; height: 14px; border-radius: 50%; cursor: pointer;

      font-size: 10px; font-weight: 600; line-height: 14px;

      margin-left: 3px; vertical-align: middle;

      background: #f0f0f0; color: #8c8c8c; transition: all 0.2s;

    }

    .col-comment-icon:hover { background: #e6f7ff; color: #1890ff; }

    .modal-comment-icon {

      display: inline-flex; align-items: center; justify-content: center;

      width: 16px; height: 16px; border-radius: 50%; cursor: pointer;

      font-size: 11px; font-weight: 700; line-height: 16px;

      margin-left: 6px; vertical-align: middle;

      background: #e6f7ff; color: #1890ff; transition: all 0.2s;

    }

    .modal-comment-icon:hover { background: #bae7ff; }

    /* AB测试 */

    .ab-wrapper { height: 100%; display: flex; flex-direction: column; }

    .ab-filter { background: #fff; padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border-light); margin-bottom: 10px; }

    .ab-filter-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .ab-filter-actions { display: flex; gap: 8px; margin-left: auto; }

    .ab-table-wrap { flex: 1; background: #fff; border-radius: 8px; border: 1px solid var(--border-light); overflow: hidden; padding: 10px; }

    .ab-status-draft { color: #8c8c8c; }

    .ab-status-running { color: #52c41a; }

    .ab-status-ended { color: #ff4d4f; }

    .ab-variant-card { border: 1px solid #f0f0f0; border-radius: 8px; padding: 12px; margin-bottom: 8px; background: #fafafa; position: relative; }

    .ab-variant-card-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-weight: 600; font-size: 13px; color: #262626; }

    .ab-variant-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .ab-variant-grid .full-width { grid-column: 1 / -1; }

    .ab-variant-remove { position: absolute; top: 12px; right: 12px; color: #ff4d4f; cursor: pointer; font-size: 18px; line-height: 1; }

    .ab-variant-remove:hover { color: #ff7875; }

    .ab-add-variant { border: 1px dashed #d9d9d9; border-radius: 8px; padding: 8px; text-align: center; cursor: pointer; color: #1890ff; transition: all 0.2s; margin-top: 6px; }

    .ab-add-variant:hover { border-color: #1890ff; background: #e6f7ff; }

    .ab-experiment-section { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #f0f0f0; }

    .ab-experiment-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

    .ab-section-title { font-weight: 600; font-size: 14px; color: #262626; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }

    .ab-section-title .badge { background: #1890ff; color: #fff; border-radius: 10px; padding: 0 8px; font-size: 12px; line-height: 20px; font-weight: 400; }

    .scene-resize-handle {

      position: absolute; top: 0; right: -3px; width: 6px; height: 100%;

      cursor: col-resize; z-index: 10;

    }

    .scene-resize-handle:hover { background: #1890ff; opacity: 0.3; }

    @media (max-width: 1200px) { .scene-nav-panel { width: 260px; min-width: 260px; } }

    @media (max-width: 900px) {

      .scene-layout { flex-direction: column; }

      .scene-nav-panel { width: 100%; min-width: auto; height: 300px; }

    }

  </style>

</head>

<body>

  <div id="root"></div>



  <!-- CDN 依赖 -->

  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

  <script>

  (function() {

    'use strict';



    const { useState, useEffect, useRef } = React;

    const {

      Tabs, Button, Select, Input, Modal, Drawer, Table, DatePicker, Form, Space, Tag, Popconfirm,

      message, Tooltip, Empty, Badge, Transfer

    } = antd;



    // ===== 模拟数据 =====

    var initialData = [

      {

        id: 's1', name: '登录大厅',

        flows: [

          { id: 'f1', name: '默认流程', activities: [

            { id: 'a1', name: '入场礼包', group: '分组1' },

            { id: 'a2', name: '每日惊喜', group: '分组1' },

          ]},

      del: I('M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z'),

      drag: I('M11 18c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm-2-8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0-6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6 4c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z'),

    // ===== 创建流程弹窗（smart_ops_strategy） =====

    function StrategyCreateModal(props) {

      var _name = useState('');

      var name = _name[0]; var setName = _name[1];

      var _type = useState(1);

      var _sort = useState(0);

      var sort = _sort[0]; var setSort = _sort[1];

      var _config = useState('');

      var config = _config[0]; var setConfig = _config[1];

      var _nodeConfig = useState('');

      var nodeConfig = _nodeConfig[0]; var setNodeConfig = _nodeConfig[1];

      var _abTestId = useState(undefined);

      var abTestId = _abTestId[0]; var setAbTestId = _abTestId[1];

      var _abTestGroup = useState(undefined);

      var abTestGroup = _abTestGroup[0]; var setAbTestGroup = _abTestGroup[1];



      // Quick config modals

      var _qcOpen = useState(false);

      var qcOpen = _qcOpen[0]; var setQcOpen = _qcOpen[1];

      var _ncOpen = useState(false);

      var ncOpen = _ncOpen[0]; var setNcOpen = _ncOpen[1];



      // Quick config form fields (both strategy & node config share the same)

      var _priority = useState('1');

      var priority = _priority[0]; var setPriority = _priority[1];

      var _isRewardsBreak = useState(false);

      var isRewardsBreak = _isRewardsBreak[0]; var setIsRewardsBreak = _isRewardsBreak[1];

      var _maxPopCount = useState('3');

      var maxPopCount = _maxPopCount[0]; var setMaxPopCount = _maxPopCount[1];

      var _matchCondition = useState(null);

      var matchCondition = _matchCondition[0]; var setMatchCondition = _matchCondition[1];



      var abExpOpts = (abExperimentData || []).map(function(e) {

        return { value: e.EXPERIMENT_ID, label: '[' + e.EXPERIMENT_ID + '] ' + e.EXPERIMENT_NAME };

      });



      function getVariantOpts() {

        var exp = (abExperimentData || []).find(function(e) { return e.EXPERIMENT_ID === abTestId; });

        if (!exp) return [];

        return exp.variants.map(function(v, i) {

          return { value: v.VARIANT_NAME, label: v.VARIANT_NAME };

        });

      }



      useEffect(function() {

        if (props.open) { setName(''); setStype(1); setSort(0); setConfig(''); setNodeConfig(''); setAbTestId(undefined); setAbTestGroup(undefined); setPriority('1'); setIsRewardsBreak(false); setMaxPopCount('3'); setMatchCondition(null); }

      }, [props.open]);



      function handleQuickConfig() {

        var obj = { priority: parseInt(priority) || 1, maxPopCount: parseInt(maxPopCount) || 3, isRewardsBreak: isRewardsBreak, matchCondition: matchCondition || { logic: 'all', groups: [{ conditions: [{ tag: 'user_level', operator: 'gt', value: '', existType: 'fail' }] }] } };
